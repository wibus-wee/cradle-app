name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'  # release; SemVer is validated in the resolve job
      - 'dev-*'   # dev
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - dev
          - release
      version:
        description: 'Version (e.g. 1.2.3 for release, or auto-generated for dev)'
        required: true
      source_ref:
        description: 'Git ref from wibus-wee/Cradle to checkout'
        required: true
        default: 'main'

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Resolve release parameters.
  resolve:
    name: Resolve release params
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.params.outputs.channel }}
      desktop_version: ${{ steps.params.outputs.desktop_version }}
      display_version: ${{ steps.params.outputs.display_version }}
      release_tag: ${{ steps.params.outputs.release_tag }}
      dev_feed_tag: ${{ steps.params.outputs.dev_feed_tag }}
      source_ref: ${{ steps.params.outputs.source_ref }}
      update_url: ${{ steps.params.outputs.update_url }}
    steps:
      - name: Resolve parameters
        id: params
        shell: bash
        run: |
          semver_regex='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          DEV_FEED_TAG="feed-dev"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANNEL="${{ inputs.channel }}"
            INPUT_VERSION="${{ inputs.version }}"
            SOURCE_REF="${{ inputs.source_ref }}"

            if [ "$CHANNEL" = "dev" ]; then
              DISPLAY_VERSION="$INPUT_VERSION"
              if [[ "$INPUT_VERSION" =~ $semver_regex ]]; then
                DESKTOP_VERSION="$INPUT_VERSION"
              else
                DESKTOP_VERSION="0.0.0-dev.${INPUT_VERSION}"
              fi
              RELEASE_TAG="dev-${DISPLAY_VERSION}"
            else
              DISPLAY_VERSION="${INPUT_VERSION#v}"
              DESKTOP_VERSION="$DISPLAY_VERSION"
              RELEASE_TAG="v${DISPLAY_VERSION}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" == dev-* ]]; then
              CHANNEL="dev"
              DISPLAY_VERSION="${TAG#dev-}"
              DESKTOP_VERSION="0.0.0-dev.${DISPLAY_VERSION}"
            else
              CHANNEL="release"
              DISPLAY_VERSION="${TAG#v}"
              DESKTOP_VERSION="$DISPLAY_VERSION"
            fi
            SOURCE_REF="main"
            RELEASE_TAG="$TAG"
          fi

          if [[ ! "$DESKTOP_VERSION" =~ $semver_regex ]]; then
            echo "Desktop version must be SemVer-compatible: $DESKTOP_VERSION" >&2
            exit 1
          fi

          if [ "$CHANNEL" = "release" ]; then
            UPDATE_URL="https://github.com/${{ github.repository }}/releases/latest/download/"
          else
            UPDATE_URL="https://github.com/${{ github.repository }}/releases/download/${DEV_FEED_TAG}/"
          fi

          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "desktop_version=$DESKTOP_VERSION" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "dev_feed_tag=$DEV_FEED_TAG" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "update_url=$UPDATE_URL" >> "$GITHUB_OUTPUT"

          echo "Channel: $CHANNEL"
          echo "Desktop version: $DESKTOP_VERSION"
          echo "Display version: $DISPLAY_VERSION"
          echo "Release tag: $RELEASE_TAG"
          echo "Dev feed tag: $DEV_FEED_TAG"
          echo "Source ref: $SOURCE_REF"
          echo "Update URL: $UPDATE_URL"

  # Build desktop for macOS.
  build:
    name: Build Desktop (${{ matrix.platform }} ${{ matrix.arch }})
    needs: [resolve]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64

    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ needs.resolve.outputs.source_ref }}

      - name: Setup pnpm & Node.js
        uses: ./.github/actions/setup
        with:
          node-version: 24

      - name: Clean macOS build leftovers
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sudo rm -rf apps/desktop/release || true
          sudo rm -rf apps/desktop/dist || true
          sudo rm -rf /tmp/electron-builder* || true

      - name: Set version
        run: pnpm --filter @cradle/desktop run set-version ${{ needs.resolve.outputs.desktop_version }}

      - name: Build & package desktop
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CRADLE_DESKTOP_UPDATE_URL: ${{ needs.resolve.outputs.update_url }}
          CRADLE_ELECTRON_REBUILD_ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
        shell: bash
        run: |
          pnpm dist:${{ matrix.platform }} --${{ matrix.arch }}

      - name: Upload artifacts
        uses: ./.github/actions/desktop-upload-artifacts
        with:
          artifact-name: desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ needs.resolve.outputs.desktop_version }}
          retention-days: 7

  # Publish GitHub Release.
  publish:
    name: Publish GitHub Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ needs.resolve.outputs.channel }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          shopt -s globstar nullglob
          for file in artifacts/**/*.{dmg,zip,exe,AppImage,deb,blockmap}; do
            target="release-assets/$(basename "$file")"
            if [ -e "$target" ]; then
              echo "Duplicate release asset name: $(basename "$file")" >&2
              exit 1
            fi
            cp "$file" "$target"
          done

          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const artifactsRoot = 'artifacts'
          const outputRoot = 'release-assets'
          const releaseChannel = process.env.RELEASE_CHANNEL

          function walk(dir, files = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const entryPath = path.join(dir, entry.name)
              if (entry.isDirectory()) {
                walk(entryPath, files)
              }
              else if (entry.isFile() && entry.name.endsWith('.yml')) {
                files.push(entryPath)
              }
            }
            return files
          }

          function readScalar(value) {
            return value.replace(/^['"]|['"]$/g, '')
          }

          function parseManifest(file) {
            const manifest = { files: [] }
            let currentFile = null

            for (const line of fs.readFileSync(file, 'utf8').split(/\r?\n/)) {
              if (!line.trim()) {
                continue
              }

              const topLevel = line.match(/^([A-Za-z0-9_-]+):(?:\s*(.*))?$/)
              if (topLevel) {
                const [, key, value = ''] = topLevel
                if (key !== 'files') {
                  manifest[key] = readScalar(value)
                }
                currentFile = null
                continue
              }

              const fileStart = line.match(/^\s*-\s+([A-Za-z0-9_-]+):\s*(.*)$/)
              if (fileStart) {
                currentFile = {}
                manifest.files.push(currentFile)
                currentFile[fileStart[1]] = readScalar(fileStart[2])
                continue
              }

              const fileProperty = line.match(/^\s+([A-Za-z0-9_-]+):\s*(.*)$/)
              if (fileProperty && currentFile) {
                currentFile[fileProperty[1]] = readScalar(fileProperty[2])
              }
            }

            return manifest
          }

          function writeManifest(file, manifest) {
            const lines = []
            if (manifest.version) {
              lines.push(`version: ${manifest.version}`)
            }
            lines.push('files:')
            for (const artifact of manifest.files) {
              lines.push(`  - url: ${artifact.url}`)
              for (const [key, value] of Object.entries(artifact)) {
                if (key !== 'url') {
                  lines.push(`    ${key}: ${value}`)
                }
              }
            }
            for (const key of ['path', 'sha512', 'releaseName', 'releaseNotes', 'releaseDate']) {
              if (manifest[key]) {
                lines.push(`${key}: ${manifest[key]}`)
              }
            }
            fs.writeFileSync(file, `${lines.join('\n')}\n`, 'utf8')
          }

          const manifestsByName = new Map()
          for (const file of walk(artifactsRoot)) {
            const name = path.basename(file)
            if (!manifestsByName.has(name)) {
              manifestsByName.set(name, [])
            }
            manifestsByName.get(name).push(file)
          }

          for (const [name, files] of manifestsByName) {
            const manifests = files.map(parseManifest)
            const merged = { ...manifests[0], files: [] }
            const seenUrls = new Set()
            for (const manifest of manifests) {
              for (const artifact of manifest.files) {
                if (artifact.url && !seenUrls.has(artifact.url)) {
                  seenUrls.add(artifact.url)
                  merged.files.push(artifact)
                }
              }
            }
            writeManifest(path.join(outputRoot, name), merged)
          }

          if (releaseChannel === 'dev') {
            const devMacManifest = path.join(outputRoot, 'dev-mac.yml')
            const latestMacManifest = path.join(outputRoot, 'latest-mac.yml')

            if (!fs.existsSync(latestMacManifest) && fs.existsSync(devMacManifest)) {
              fs.copyFileSync(devMacManifest, latestMacManifest)
            }

            if (!fs.existsSync(latestMacManifest)) {
              throw new Error('Dev release feed requires latest-mac.yml')
            }

            fs.rmSync(devMacManifest, { force: true })
          }
          NODE

          find release-assets -maxdepth 1 -type f -print | sort

      - name: Create version release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: "${{ needs.resolve.outputs.release_tag }} (${{ needs.resolve.outputs.channel }})"
          prerelease: ${{ needs.resolve.outputs.channel == 'dev' }}
          make_latest: ${{ needs.resolve.outputs.channel == 'release' }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove stale dev feed manifests
        if: needs.resolve.outputs.channel == 'dev'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          release_json=$(gh api "repos/${{ github.repository }}/releases/tags/${{ needs.resolve.outputs.dev_feed_tag }}" 2>/dev/null || true)
          if [ -z "$release_json" ]; then
            exit 0
          fi

          release_id=$(node -e 'const fs = require("node:fs"); const input = fs.readFileSync(0, "utf8"); console.log(JSON.parse(input).id)' <<< "$release_json")
          gh api "repos/${{ github.repository }}/releases/${release_id}/assets" --paginate --jq '.[] | select(.name == "dev-mac.yml") | .id' |
            while read -r asset_id; do
              [ -n "$asset_id" ] && gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}" >/dev/null
            done

      - name: Update dev feed release
        if: needs.resolve.outputs.channel == 'dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.dev_feed_tag }}
          target_commitish: ${{ github.sha }}
          name: "Feed dev"
          body: "Rolling desktop dev update feed for ${{ needs.resolve.outputs.release_tag }}."
          prerelease: true
          make_latest: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
