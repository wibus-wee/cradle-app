name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: main
      - uses: ./.github/actions/setup
        with:
          node-version: 24
      - name: Run ESLint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: main
      - uses: ./.github/actions/setup
        with:
          node-version: 24
      - name: Typecheck Server (apps/server)
        run: pnpm typecheck:server
      - name: Typecheck Web App (apps/web)
        run: pnpm typecheck:apps-web
      - name: Typecheck Desktop (apps/desktop)
        run: pnpm typecheck:desktop

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: main
      - uses: ./.github/actions/setup
        with:
          node-version: 24
      - name: Run Vitest (src + packages)
        run: pnpm test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_id }}
          path: coverage/
          retention-days: 7

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    env:
      CRADLE_CREDENTIAL_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: main
      - uses: ./.github/actions/setup
        with:
          node-version: 24
      - name: Run Server Vitest
        run: pnpm test:server
      - name: Upload server test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results-${{ github.run_id }}
          path: apps/server/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout Cradle source
        uses: actions/checkout@v4
        with:
          repository: wibus-wee/Cradle
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: main
      - uses: ./.github/actions/setup
        with:
          node-version: 24
      - name: Build Web App (apps/web)
        run: pnpm build:web
      - name: Build Server (apps/server)
        run: pnpm build:server
      - name: Build Desktop (apps/desktop)
        run: pnpm build:desktop
