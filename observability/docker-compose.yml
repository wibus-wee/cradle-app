services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cradle-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    extra_hosts:
      # Lets the container reach the Cradle server's /metrics on the host (Linux).
      # macOS/Windows Docker Desktop resolve host.docker.internal automatically.
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana-oss:latest
    container_name: cradle-grafana
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/cradle-runtime.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3001:3000'

volumes:
  prometheus-data:
  grafana-data:
