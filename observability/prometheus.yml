global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: cradle-server
    metrics_path: /metrics
    static_configs:
      # The Cradle desktop server exposes its Prometheus exporter on the host.
      # CRADLE_OTEL_PROMETHEUS_PORT in apps/desktop/.env controls the port (9464).
      - targets: ['host.docker.internal:9464']
        labels:
          service: cradle-server
