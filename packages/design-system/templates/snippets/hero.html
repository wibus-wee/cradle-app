<!-- hero.html — Project title, tagline, and CTA button -->
<section style="padding: 64px 0 48px; text-align: center;">
  <p style="
    margin: 0 0 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--color-accent);
    letter-spacing: 0.06em;
  ">Cradle Design System · v0.1</p>

  <h1 style="
    margin: 0 0 16px;
    font-family: var(--font-sans);
    font-size: 30px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.02em;
    color: var(--color-neutral-10);
  ">Precise. Surface-textured.<br>Spring-everywhere.</h1>

  <p style="
    margin: 0 auto 32px;
    max-width: 480px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--color-neutral-6);
  ">A modern, physics-native desktop AI environment. Between Linear and Vercel: precise, high-contrast, unsentimental.</p>

  <div style="display: flex; justify-content: center; gap: 8px;">
    <button style="
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 16px;
      background: var(--color-neutral-9);
      color: var(--color-neutral-1);
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    ">Get started</button>

    <button style="
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 16px;
      background: transparent;
      color: var(--color-neutral-7);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    ">View tokens</button>
  </div>
</section>
