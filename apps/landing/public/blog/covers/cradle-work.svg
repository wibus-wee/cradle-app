<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <radialGradient id="warm" cx="50%" cy="58%" r="55%">
      <stop offset="0%" stop-color="#ffe9c2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffe9c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="#0b0b0e"/>
  <rect width="1600" height="1000" fill="url(#warm)"/>
  <g stroke="#ffffff" stroke-opacity="0.045" stroke-width="1">
    <path d="M0 250 H1600 M0 500 H1600 M0 750 H1600"/>
    <path d="M400 0 V1000 M800 0 V1000 M1200 0 V1000"/>
  </g>
  <!-- delivery path -->
  <line x1="260" y1="560" x2="1340" y2="560" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="260" y1="560" x2="800" y2="560" stroke="#f4f4f5" stroke-opacity="0.45" stroke-width="2"/>
  <!-- stations -->
  <circle cx="260" cy="560" r="11" fill="#f4f4f5"/>
  <circle cx="530" cy="560" r="11" fill="#f4f4f5"/>
  <circle cx="800" cy="560" r="15" fill="#0b0b0e" stroke="#ffe9c2" stroke-width="3"/>
  <circle cx="800" cy="560" r="6" fill="#ffe9c2"/>
  <circle cx="1070" cy="560" r="11" fill="#0b0b0e" stroke="#f4f4f5" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="1340" cy="560" r="11" fill="#0b0b0e" stroke="#f4f4f5" stroke-opacity="0.35" stroke-width="2"/>
  <!-- station ticks -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5">
    <line x1="260" y1="592" x2="260" y2="606"/>
    <line x1="530" y1="592" x2="530" y2="606"/>
    <line x1="800" y1="592" x2="800" y2="606"/>
    <line x1="1070" y1="592" x2="1070" y2="606"/>
    <line x1="1340" y1="592" x2="1340" y2="606"/>
  </g>
  <!-- work capsule above active station -->
  <rect x="690" y="370" width="220" height="76" rx="38" fill="#0b0b0e" stroke="#f4f4f5" stroke-opacity="0.4" stroke-width="2"/>
  <circle cx="736" cy="408" r="9" fill="#ffe9c2"/>
  <path d="M764 408 h106" stroke="#f4f4f5" stroke-opacity="0.35" stroke-width="7" stroke-linecap="round"/>
  <line x1="800" y1="446" x2="800" y2="540" stroke="#f4f4f5" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="3 7"/>
  <!-- orbiting accent -->
  <circle cx="910" cy="380" r="3" fill="#ffe9c2" fill-opacity="0.5"/>
  <!-- particles -->
  <g fill="#f4f4f5" fill-opacity="0.22">
    <circle cx="420" cy="400" r="2.5"/>
    <circle cx="1180" cy="430" r="2.5"/>
    <circle cx="640" cy="300" r="2"/>
  </g>
</svg>
