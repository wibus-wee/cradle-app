<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800">
  <defs>
    <radialGradient id="warm" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe9c2" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffe9c2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="800" fill="#0b0b0e"/>
  <rect width="1600" height="800" fill="url(#warm)"/>
  <!-- path -->
  <line x1="160" y1="380" x2="1440" y2="380" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="160" y1="380" x2="800" y2="380" stroke="#f4f4f5" stroke-opacity="0.4" stroke-width="2"/>
  <!-- stations with labels -->
  <g font-family="ui-monospace, monospace" font-size="20" fill="#a1a1aa" text-anchor="middle">
    <circle cx="160" cy="380" r="10" fill="#f4f4f5"/>
    <text x="160" y="445">Objective</text>

    <circle cx="480" cy="380" r="10" fill="#f4f4f5"/>
    <text x="480" y="445">Isolated</text>
    <text x="480" y="472">execution</text>

    <circle cx="800" cy="380" r="14" fill="#0b0b0e" stroke="#ffe9c2" stroke-width="3"/>
    <circle cx="800" cy="380" r="5" fill="#ffe9c2"/>
    <text x="800" y="445" fill="#f4f4f5">Review</text>
    <text x="800" y="472" fill="#f4f4f5">changes</text>

    <circle cx="1120" cy="380" r="10" fill="#0b0b0e" stroke="#f4f4f5" stroke-opacity="0.4" stroke-width="2"/>
    <text x="1120" y="445">Local commit</text>

    <circle cx="1440" cy="380" r="10" fill="#0b0b0e" stroke="#f4f4f5" stroke-opacity="0.4" stroke-width="2"/>
    <text x="1440" y="445">Pull request</text>
  </g>
  <!-- confirmation gate -->
  <g font-family="ui-monospace, monospace" font-size="16" fill="#6b6b73" text-anchor="middle">
    <rect x="1040" y="240" width="160" height="44" rx="22" fill="none" stroke="#f4f4f5" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="1120" y="268">user confirms</text>
    <line x1="1120" y1="284" x2="1120" y2="362" stroke="#f4f4f5" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="3 6"/>
  </g>
  <!-- boundary annotation -->
  <g font-family="ui-monospace, monospace" font-size="16" fill="#6b6b73" text-anchor="middle">
    <text x="640" y="320">agent executes →</text>
    <text x="960" y="320" fill="#ffe9c2" fill-opacity="0.7">← you decide</text>
  </g>
</svg>
