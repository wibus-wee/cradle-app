id: generated-api-call-wrapper
language: TypeScript
severity: warning
message: Function only wraps a generated HTTP SDK call; consider calling the generated owner directly or moving semantics into the feature owner.
rule:
  pattern: function $FUNC($$$ARGS) { return $CLIENT($$$CALL_ARGS) }
constraints:
  CLIENT:
    regex: ^(get|post|put|patch|delete)[A-Z].*
